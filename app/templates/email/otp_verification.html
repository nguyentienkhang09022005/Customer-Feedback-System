<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác minh OTP</title>
</head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; background-color: #0d1117; color: #c9d1d9;">
    <div style="background-color: #161b22; border-radius: 12px; border: 1px solid #30363d; overflow: hidden;">
        <div style="background-color: #1c2128; padding: 24px 32px; border-bottom: 1px solid #30363d;">
            <h2 style="color: #238636; margin: 0;">Xác minh OTP</h2>
        </div>
        <div style="padding: 28px 32px;">
            <div style="background-color: #0d1117; padding: 24px; border-radius: 8px; text-align: center; border: 1px solid #30363d; margin-bottom: 20px;">
                <p style="color: #8b949e; font-size: 14px; margin: 0 0 12px 0;">Mã xác minh của bạn là</p>
                <h1 style="color: #238636; letter-spacing: 8px; margin: 0; font-size: 32px;">{otp_code}</h1>
            </div>
            <p style="color: #c9d1d9; margin: 0 0 16px 0; line-height: 1.6;">
                Mã này sẽ hết hạn trong <strong style="color: #f0883e;">5 phút</strong>.
            </p>
            <p style="color: #8b949e; font-size: 13px; margin: 0;">
                Nếu bạn không yêu cầu mã này, vui lòng bỏ qua email.
            </p>
        </div>
        <div style="background-color: #1c2128; padding: 16px 32px; border-top: 1px solid #30363d;">
            <p style="color: #484f58; font-size: 12px; margin: 0;">
                <strong>Customer Feedback System</strong><br>
                Email tự động - vui lòng không reply trực tiếp
            </p>
        </div>
    </div>
</body>
</html>

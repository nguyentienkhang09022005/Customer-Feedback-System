# ---------------------------------------------------------------------------
# Customer Feedback System – Test Infrastructure
# ---------------------------------------------------------------------------
# This file provides a PostgreSQL container for tests that need a production-
# like database (integration tests, schema validation, etc.).
#
# Usage:
#   # 1. Start PostgreSQL (in a new terminal or background):
#   docker compose -f docker-compose.test.yml up -d
#
#   # 2. Run tests against PostgreSQL:
#   TEST_DATABASE_URL="postgresql://testuser:testpass@localhost:5432/testdb" \
#     pytest tests/
#
#   # 3. Stop PostgreSQL:
#   docker compose -f docker-compose.test.yml down
#
# Note:
#   • Without TEST_DATABASE_URL tests run with in-process SQLite (existing behaviour).
#   • The test user and database are created automatically via POSTGRES_INITDB_ARGS.
# ---------------------------------------------------------------------------

services:
  postgres:
    image: postgres:16-alpine
    container_name: cfs-test-postgres
    environment:
      POSTGRES_DB: testdb
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.utf8"
    ports:
      - "5433:5432"
    volumes:
      - cfs-test-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d testdb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  cfs-test-pgdata:

[pytest]
# ============================================================================
# Pytest Configuration - Customer Feedback System Test Suite
# ============================================================================
# Markers defined here are available across all test files without import.
# Use: pytest -m <marker> to select a subset of tests.

minversion = 8.0

# Default test paths
testpaths = tests

# Default verbose output
addopts = -v --strict-markers --tb=short

# Marker definitions (documented for team reference)
markers =
    # By test tier (mutually exclusive for categorization)
    unit:               Unit tests - pure service/repo logic, mocked dependencies, no external I/O
    integration:        Integration tests - real service chains, minimal mocking, database involved
    system:             System/E2E tests - full HTTP requests via TestClient, multi-endpoint workflows

    # By execution speed
    slow:               Tests that take >2s to run (e.g., Redis calls, SMTP mock overhead, large fixtures)

    # By functional domain
    auth:               Authentication and authorization tests
    ticket:             Ticket management tests
    chat:               Chat/messaging tests
    chatbot:            Chatbot/AI service tests
    appointment:        Appointment scheduling tests
    sla:                SLA policy and escalation tests
    evaluate:           Evaluation/CSAT tests
    notification:      Notification service tests
    escalation:         Escalation service tests
    loadbalancer:       Load balancer tests
    email:              Email service tests
    otp:                OTP service tests
    redis:              Redis service tests
    department:         Department management tests
    employee:           Employee management tests
    customer:           Customer management tests
    file:               File handling tests
    tag:                Tag management tests
    sentiment:          Sentiment analysis tests
    groq:               Groq AI service tests

    # By feature area
    e2e:                End-to-end user journey tests
    admin:              Admin operations tests
    bulk:               Bulk operation tests
    api:                API endpoint tests
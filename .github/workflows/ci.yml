name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.14"

jobs:
  # -------------------------------------------------------------------------
  # Layer 1 – Unit tests (SQLite, no external deps, fastest)
  # -------------------------------------------------------------------------
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -q -r requirements.txt

      - name: Run unit tests
        run: |
          pytest tests/ \
            --ignore=tests/test_api_integration.py \
            --ignore=tests/test_integration_critical_flows.py \
            --ignore=tests/test_system_e2e.py \
            -q --tb=short

  # -------------------------------------------------------------------------
  # Layer 2 – Integration tests (SQLite, use FastAPI TestClient)
  # -------------------------------------------------------------------------
  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -q -r requirements.txt

      - name: Run integration tests
        run: |
          pytest tests/test_api_integration.py \
                   tests/test_integration_critical_flows.py \
            -q --tb=short

  # -------------------------------------------------------------------------
  # Layer 3 – E2E / System tests (FastAPI TestClient, no external services)
  # -------------------------------------------------------------------------
  e2e-tests:
    name: E2E / System tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -q -r requirements.txt

      - name: Run E2E / System tests
        run: |
          pytest tests/test_system_e2e.py \
            -q --tb=short

  # -------------------------------------------------------------------------
  # Layer 4 – PostgreSQL integration (production-like validation)
  #
  # Expected: slightly more failures than SQLite due to stricter type/constraint
  # enforcement (e.g. tests that expect version-as-PK on TicketTemplate).
  # This layer is informational: it validates schema correctness, not test
  # pass rate.  Set continue-on-error: true to allow other layers to complete.
  # -------------------------------------------------------------------------
  postgres-tests:
    name: PostgreSQL integration
    runs-on: ubuntu-latest
    continue-on-error: true   # some test_ticket_template tests are PG-sensitive
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -q -r requirements.txt

      - name: Run tests against PostgreSQL
        env:
          TEST_DATABASE_URL: postgresql://testuser:testpass@localhost:5433/testdb
        run: |
          pytest tests/ \
            --ignore=tests/test_api_integration.py \
            --ignore=tests/test_integration_critical_flows.py \
            --ignore=tests/test_system_e2e.py \
            -q --tb=line

  # -------------------------------------------------------------------------
  # Coverage (runs after all layers on main / PRs)
  # -------------------------------------------------------------------------
  coverage:
    name: Coverage report
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e-tests]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -q -r requirements.txt

      - name: Install coverage tools
        run: pip install -q coverage pytest-cov

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            -q --tb=short

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: CI-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7
